name: Release Standalone XSL

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install XSLT tooling
        run: sudo apt-get update && sudo apt-get install -y xsltproc libxml2-utils

      - name: Validate repository rules
        run: bash tests/validate_repo_rules.sh

      - name: Validate XSL tooling
        run: bash tests/validate_xsl_tooling.sh

      - name: Build standalone stylesheet
        run: python3 tools/build_xsl.py

      - name: Prepare versioned asset
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp dist/nmap2html-standalone.xsl "dist/nmap2html-v${VERSION}-standalone.xsl"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="NmapView ${TAG}"
          NOTES="Standalone XSLT release artifact for ${TAG}."
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/nmap2html-standalone.xsl "dist/nmap2html-v${TAG#v}-standalone.xsl" --clobber
          else
            gh release create "${TAG}" \
              dist/nmap2html-standalone.xsl \
              "dist/nmap2html-v${TAG#v}-standalone.xsl" \
              --title "${TITLE}" \
              --notes "${NOTES}"
          fi
